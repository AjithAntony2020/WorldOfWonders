<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navigation Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Responsive Navigation Bar (Flexbox) -->
    <nav class="navbar">
        <div class="logo">World Wonders</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="description.html">Description</a></li>
        </ul>
    </nav>

    <!-- Wonder Card (CSS Grid) -->
    <section class="wonders-section">
        <!-- Dynamic container for wonder cards - populated by JavaScript -->
        <div class="wonders-container" id="wonders-container">
            <!-- Cards will be generated here by JavaScript rendering engine -->
        </div>
    </section>


    <!-- Load JavaScript rendering engine -->
    <script src="script.js"></script>

<!-- Accessible Contact Form -->
    <section class="contact-section">
        <h2>Get In Touch</h2>
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required 
                    placeholder="Your full name"
                >
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="your.email@example.com"
                >
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" name="subject" required>
                    <option value="">Select a subject</option>
                    <option value="inquiry">General Inquiry</option>
                    <option value="collaboration">Collaboration Request</option>
                    <option value="support">Support</option>
                    <option value="feedback">Feedback</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea 
                    id="message" 
                    name="message" 
                    rows="6" 
                    required 
                    placeholder="Please share your message here..."
                ></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 World Wonders. All rights reserved.</p>
            <p>Contact: info@worldwonders.com | Phone: +1 (555) 123-4567</p>
            <p>Last updated: April 17, 2026</p>
        </div>
    </footer>
</body>
</html>
