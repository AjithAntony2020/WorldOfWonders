<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Description</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Responsive Navigation Bar (Flexbox) -->
    <nav class="navbar">
        <div class="logo">World Wonders</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="description.html">Description</a></li>
        </ul>
    </nav>

    <!-- Wonder Description Section -->
    <section class="wonders-section">
        <div class="description-container" id="description-container">
            <h2 id="wonder-title"></h2>
            <p id="wonder-description-text" class="wonder-description-text"></p>
            <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
        </div>
    </section>

    <!-- Load JavaScript rendering engine -->
    <script src="script.js"></script>

    <script>
        // Display the fetched description on page load
        document.addEventListener('DOMContentLoaded', function() {
            const wonderTitle = sessionStorage.getItem('wonderTitle');
            const wonderDescription = sessionStorage.getItem('wonderDescription');
            
            const titleElement = document.getElementById('wonder-title');
            const descriptionElement = document.getElementById('wonder-description-text');
            
            if (wonderTitle && wonderDescription) {
                titleElement.textContent = wonderTitle;
                descriptionElement.textContent = wonderDescription;
            } else {
                titleElement.textContent = 'Description';
                descriptionElement.innerHTML = '<p>No description available. Please select a wonder from the home page.</p>';
            }
            
            // Clear sessionStorage after displaying
            // Uncomment the line below if you want to clear after viewing
            // sessionStorage.clear();
        });
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 World Wonders. All rights reserved.</p>
            <p>Contact: info@worldwonders.com | Phone: +1 (555) 123-4567</p>
            <p>Last updated: April 17, 2026</p>
        </div>
    </footer>
</body>
</html>
